name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ── Job 1: Quality Gate ──────────────────────────────────────────────────────
  quality-gate:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit safety

      - name: Run ruff linting
        run: |
          ruff check backend/ frontend/

      - name: Run Bandit security scan
        run: |
          bandit -r backend/ -ll --exit-zero

      - name: Run Safety dependency vulnerability scan
        run: |
          safety check -r requirements.txt --continue-on-error

  # ── Job 2: Tests ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio==0.23.6 pytest-mock

      - name: Run tests
        run: |
          pytest tests/test_processor.py tests/test_pipeline_1.py tests/test_vector_store.py tests/test_langgraph_agent.py -v
        env:
          OPENAI_API_KEY: "test-key-not-real"
          COHERE_API_KEY: "test-key-not-real"
          LANGSMITH_API_KEY: "test-key-not-real"
          LANGSMITH_TRACING: "false"
          QDRANT_URL: "https://test.qdrant.io"
          QDRANT_API_KEY: "test-key-not-real"

  # ── Job 3: Docker Build Verification ─────────────────────────────────────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t rag-optimizer-test .

      - name: Verify image was created
        run: |
          docker images rag-optimizer-test

  # ── Job 4: Deploy to HuggingFace ─────────────────────────────────────────────
  deploy:
    name: Deploy to HuggingFace
    runs-on: ubuntu-latest
    needs: [quality-gate, test, docker-build]
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://urvpatel:${HF_TOKEN}@huggingface.co/spaces/urvpatel/rag-pipeline-optimizer main --force

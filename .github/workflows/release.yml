name: Release Automation

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - 'assets/**'
      - '.github/**'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          LATEST=$(git tag --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST"

      - name: Generate next version
        id: next_version
        run: |
          LATEST="${{ steps.get_tag.outputs.latest }}"
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT"

      - name: Generate changelog
        id: changelog
        run: |
          LATEST="${{ steps.get_tag.outputs.latest }}"
          if [ "$LATEST" = "v0.0.0" ]; then
            CHANGES=$(git log --oneline -10 --pretty=format:"- %s")
          else
            CHANGES=$(git log ${LATEST}..HEAD --oneline --pretty=format:"- %s")
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.next_version.outputs.next }}
          release_name: Release ${{ steps.next_version.outputs.next }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changes }}

            ## Pipeline Status
            ✅ All CI gates passed
            ✅ Security scan passed
            ✅ 40 tests passing
            ✅ Docker build verified
            ✅ Deployed to HuggingFace Spaces

            **Full Changelog**: https://github.com/devurvpatel/rag-pipeline-optimizer/commits/master
          draft: false
          prerelease: false